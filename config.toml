# OpenFang Agent OS — Leviathan HYDRA Pod Configuration v3.4
# Supreme Commander: Emperor / Shark Commander
# HYDRA Roster: Emperor, Architect, Scribe, Sentinel, Operator, Shark Commander

# API server settings for Railway deployment
api_listen = "0.0.0.0:50051"
api_key = ""

[default_model]
provider = "openrouter"
base_url = "https://openrouter.ai/api/v1"
model = "deepseek/deepseek-chat-v3-0324:free"
api_key_env = "OPENROUTER_API_KEY"
max_tokens = 8192
temperature = 0.3

[memory]
decay_rate = 0.05

[compaction]
threshold = 80
keep_recent = 20
max_summary_tokens = 1024

usage_footer = "full"

[discord]
bot_token_env = "DISCORD_BOT_TOKEN"
guild_ids = [1475947548811202613, 1477804209842815382]

[vault]
master_key_env = "OPENFANG_VAULT_KEY"

# Shark Commander Brain — DeepSeek R1 overseer agent
[agent.shark-commander]
manifest = "agents/shark-commander/agent.toml"
system_prompt = "prompts/shark-commander.md"
autostart = true
