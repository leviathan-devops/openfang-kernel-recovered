# OpenFang Agent OS — Shark Commander Brain Configuration
# Deployed on Railway for Phase 1

# API server binding — Railway overrides via PORT env var in leviathan-server
api_listen = "0.0.0.0:8080"

# No API key — healthcheck and entrypoint need unauthenticated access
api_key = ""

# Default model: DeepSeek R1 (Shark Commander brain)
[default_model]
provider = "deepseek"
model = "deepseek-reasoner"
api_key_env = "DEEPSEEK_API_KEY"

# Memory substrate
[memory]
decay_rate = 0.05

# Session compaction
[compaction]
threshold = 80
keep_recent = 20
max_summary_tokens = 1024

# Usage footer — must match UsageFooterMode enum variant exactly
usage_footer = "Full"

# Discord channel bridge — MUST be nested under [channels] to match ChannelsConfig struct
# Top-level [discord] is silently ignored by serde (no #[serde(flatten)] on channels field)
[channels.discord]
bot_token_env = "DISCORD_TOKEN"
default_agent = "shark-commander"
