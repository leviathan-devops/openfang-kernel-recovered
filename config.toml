# OpenFang Agent OS — Shark Commander Brain Configuration
# Deployed on Railway for Phase 1

# API server binding — Railway overrides via PORT env var
# but leviathan-server reads PORT directly, so this is the fallback
api_listen = "0.0.0.0:8080"
api_key = ""

# Default model: DeepSeek R1 (Shark Commander brain)
[default_model]
provider = "deepseek"
model = "deepseek-reasoner"
api_key_env = "DEEPSEEK_API_KEY"

# Memory substrate
[memory]
decay_rate = 0.05

# Session compaction
[compaction]
threshold = 80
keep_recent = 20
max_summary_tokens = 1024

# Usage footer
usage_footer = "Full"

# Discord channel bridge — correct nested path under [channels]
[channels.discord]
bot_token_env = "DISCORD_TOKEN"
default_agent = "shark-commander"
